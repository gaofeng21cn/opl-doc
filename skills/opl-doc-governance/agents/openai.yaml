interface:
  display_name: "OPL Doc Governance"
  short_description: "Compatibility entry for OPL Doc"
  default_prompt: >-
    Use $opl-doc-governance as a compatibility entry for existing prompts, then
    follow canonical $opl-doc. Govern this repo's developer documentation
    lifecycle, audit README/docs against live truth, and create or resume a
    /goal for OPL series or long-running cleanup. The compatibility entry is
    this plugin's skills/opl-doc-governance/SKILL.md; the canonical workflow is
    skills/opl-doc/SKILL.md.
policy:
  allow_implicit_invocation: true
